<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4DA6"/>
      <stop offset="100%" stop-color="#E6007E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Crown -->
  <path d="M230 22 L248 6 L266 20 L284 4 L302 20 L320 6 L338 22 L330 32 L238 32 Z" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>
  <circle cx="266" cy="14" r="4" fill="#E6007E"/>
  <circle cx="284" cy="10" r="5" fill="#E6007E"/>
  <circle cx="302" cy="14" r="4" fill="#E6007E"/>
  <!-- Bb script - much larger -->
  <text x="300" y="95" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="110" font-style="italic" font-weight="700" fill="url(#pinkGrad)">Bb</text>
  <!-- SALON SUITES -->
  <text x="300" y="135" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" letter-spacing="10" fill="#111111">SALON SUITES</text>
  <!-- Gold divider with heart -->
  <line x1="160" y1="150" x2="275" y2="150" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <path d="M300 140 C290 128 276 132 276 142 C276 154 300 168 300 168 C300 168 324 154 324 142 C324 132 310 128 300 140Z" fill="#E6007E"/>
  <line x1="325" y1="150" x2="440" y2="150" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <!-- Hair & Braiding -->
  <text x="300" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-style="italic" fill="url(#pinkGrad)">Hair &amp; Braiding</text>
</svg>
