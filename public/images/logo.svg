<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4DA6"/>
      <stop offset="100%" stop-color="#E6007E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Crown -->
  <path d="M155 18 L165 8 L175 16 L185 6 L195 16 L205 8 L215 18 L210 24 L160 24 Z" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="0.5"/>
  <circle cx="175" cy="12" r="2" fill="#E6007E"/>
  <circle cx="185" cy="10" r="2.5" fill="#E6007E"/>
  <circle cx="195" cy="12" r="2" fill="#E6007E"/>
  <!-- Bb script -->
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="700" fill="url(#pinkGrad)" filter="url(#glow)">Bb</text>
  <!-- SALON SUITES -->
  <text x="200" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="6" fill="#111111">SALON SUITES</text>
  <!-- Gold divider with heart -->
  <line x1="120" y1="118" x2="185" y2="118" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <path d="M200 112 C195 106 188 108 188 114 C188 120 200 126 200 126 C200 126 212 120 212 114 C212 108 205 106 200 112Z" fill="#E6007E"/>
  <line x1="215" y1="118" x2="280" y2="118" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- Hair & Braiding -->
  <text x="200" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="url(#pinkGrad)">Hair &amp; Braiding</text>
  <!-- Tagline -->
  <text x="200" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#333333">Your Beauty, Our Passion</text>
</svg>
