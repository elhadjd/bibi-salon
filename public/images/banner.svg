<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="40%" stop-color="#E6007E"/>
      <stop offset="100%" stop-color="#9B0059"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="sparkle" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#sparkle)"/>
  <!-- Gold curves -->
  <path d="M0 400 Q400 200 960 350 T1920 300 L1920 0 L0 0 Z" fill="#000000" fill-opacity="0.15"/>
  <path d="M0 700 Q500 900 960 750 T1920 800 L1920 1080 L0 1080 Z" fill="#000000" fill-opacity="0.2"/>
  <ellipse cx="300" cy="200" rx="120" ry="80" fill="#FFFFFF" fill-opacity="0.08"/>
  <ellipse cx="1600" cy="300" rx="150" ry="100" fill="#FFFFFF" fill-opacity="0.06"/>
  <ellipse cx="900" cy="150" rx="200" ry="120" fill="#FFD700" fill-opacity="0.1"/>
  <!-- Sparkle dots -->
  <circle cx="200" cy="180" r="3" fill="#FFFFFF" fill-opacity="0.6"/>
  <circle cx="450" cy="120" r="2" fill="#FFD700" fill-opacity="0.8"/>
  <circle cx="700" cy="250" r="2.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="1200" cy="150" r="3" fill="#FFD700" fill-opacity="0.7"/>
  <circle cx="1500" cy="220" r="2" fill="#FFFFFF" fill-opacity="0.6"/>
  <circle cx="1700" cy="100" r="3.5" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="100" cy="500" r="2" fill="#FFD700" fill-opacity="0.5"/>
  <circle cx="1800" cy="600" r="2.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- Center brand text -->
  <text x="960" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="140" font-style="italic" font-weight="700" fill="#FFFFFF" fill-opacity="0.15">Bb</text>
  <text x="960" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="700" letter-spacing="12" fill="#FFFFFF" fill-opacity="0.12">SALON SUITES</text>
  <text x="960" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-style="italic" fill="#FFD700" fill-opacity="0.2">Your Beauty, Our Passion</text>
  <!-- Gold border accent -->
  <rect x="40" y="40" width="1840" height="1000" rx="20" stroke="url(#gold)" stroke-width="3" fill="none" fill-opacity="0.3"/>
</svg>
